name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: jobs only need to read the repo.
permissions:
  contents: read

# Third-party actions are pinned by commit SHA (version in the comment) so a moved tag
# can't silently change what runs in CI.
jobs:
  test:
    # Multi-OS to back the "OS Independent" classifier: full Python matrix on Linux, plus a
    # macOS and Windows job. Tests don't shell out to ffmpeg (it's mocked), so the binary is
    # only installed on Linux for the realistic path.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install ffmpeg (system dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check translate_subs/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check translate_subs/ tests/

      - name: Type-check (mypy)
        run: uv run mypy translate_subs/

      - name: Tests (with coverage report)
        run: uv run pytest -q --cov=translate_subs --cov-report=term-missing

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Audit dependencies for known vulnerabilities
        run: uv run --with pip-audit pip-audit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build wheel and sdist
        run: uv build
      - name: Check package metadata
        run: uvx twine check dist/*
      - name: Smoke test (install the wheel and run the CLI)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/translate-subs --version
          /tmp/smoke/bin/translate-subs --help
