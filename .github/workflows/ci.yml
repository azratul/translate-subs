name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: jobs only need to read the repo.
permissions:
  contents: read

# Third-party actions are pinned by commit SHA (version in the comment) so a moved tag
# can't silently change what runs in CI.
jobs:
  test:
    # Multi-OS to back the "OS Independent" classifier: full Python matrix on Linux, plus a
    # macOS and Windows job. Most tests fake the media layer, but test_ffmpeg_integration.py muxes
    # a real .mkv and runs whenever ffmpeg is present (skipped otherwise), so the binary is
    # installed on Linux to exercise that real extraction path.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install ffmpeg (system dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check translate_subs/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check translate_subs/ tests/

      - name: Type-check (mypy)
        run: uv run mypy translate_subs/

      - name: Tests (with coverage report)
        run: uv run pytest -q --cov=translate_subs --cov-report=term-missing

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Verify lockfile is current
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Audit dependencies for known vulnerabilities
        run: uv run --with pip-audit pip-audit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Verify lockfile is current
        run: uv lock --check
      - name: Build wheel and sdist
        run: uv build
      - name: Check package metadata
        run: uvx twine check dist/*
      - name: Smoke test (install the wheel and run the CLI)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/pip check
          PKG_VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          for COMMAND in llm-subs translate-subs; do
            ACTUAL_VERSION=$(/tmp/smoke/bin/${COMMAND} --version)
            if [ "${ACTUAL_VERSION}" != "${PKG_VERSION}" ]; then
              echo "${COMMAND} reported ${ACTUAL_VERSION}; expected ${PKG_VERSION}"
              exit 1
            fi
            /tmp/smoke/bin/${COMMAND} --help >/dev/null
          done
          # Run the real pipeline as a user would, not just --help: a full identity round-trip.
          printf '1\n00:00:01,000 --> 00:00:03,000\nHello world.\n' > /tmp/smoke/ep.en.srt
          /tmp/smoke/bin/llm-subs translate /tmp/smoke/ep.en.srt \
            --provider identity --target es-latam --out-dir /tmp/smoke/out --non-interactive
          test -f "/tmp/smoke/out/ep.es-latam.ass" || { echo "expected output not produced"; exit 1; }

  # What a brand-new user gets from `pip install` (fresh dependency resolution, not the dev
  # lockfile), plus the optional litellm extra that `uv sync` (no extras) never exercises.
  pip-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.0.0
        with:
          python-version: "3.12"
      - name: Install from source with pip (no lockfile)
        run: |
          python -m venv /tmp/pipenv
          /tmp/pipenv/bin/pip install .
          /tmp/pipenv/bin/pip check
          /tmp/pipenv/bin/llm-subs --help >/dev/null
          printf '1\n00:00:01,000 --> 00:00:03,000\nHello world.\n' > /tmp/pip-ep.en.srt
          /tmp/pipenv/bin/llm-subs translate /tmp/pip-ep.en.srt \
            --provider identity --target es-latam --out-dir /tmp/pip-out --non-interactive
          test -f "/tmp/pip-out/pip-ep.es-latam.ass" || { echo "expected output not produced"; exit 1; }
      - name: Install the litellm extra and import it
        run: |
          /tmp/pipenv/bin/pip install ".[litellm]"
          /tmp/pipenv/bin/pip check
          /tmp/pipenv/bin/python -c "import litellm; from translate_subs.ai.api_adapters import LiteLLMRunner"
